<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>PinoutDB</title>
        <link href="css/main.css" rel="stylesheet">
        <link href="pagefind/pagefind-component-ui.css" rel="stylesheet">
        <script src="pagefind/pagefind-component-ui.js" type="module"></script>
    </head>
    <body>
        <h1>PinoutDB</h1>
        <p>Pick filters, or search by pin functions (e.g. 5:A11 46:GND).</p>
        <div style="display: flex; flex-wrap: wrap; max-width: 120ch;">
            <div style="min-width: 20ch; max-width: 40ch; padding: 1rem;">
                <pagefind-config faceted preload></pagefind-config>
                <pagefind-filter-pane filter="site" label="Filters" expanded></pagefind-filter-pane>
            </div>
            <div style="max-width: 60ch; padding: 1rem;">
                <div style="padding-bottom: 1rem;">
                    <pagefind-input placeholder=" "></pagefind-input>
                </div>
                <div>
                    <pagefind-results></pagefind-results>
                </div>
            </div>
        </div>
    </body>
</html>
